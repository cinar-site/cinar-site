<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yeni Şifre</title>

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image: url("{{ url_for('static', filename='bg.png') }}");
    background-size:cover;
    font-family:'Segoe UI';
}

.box{
    width:400px;
    padding:40px;
    border-radius:25px;
    backdrop-filter: blur(25px);
    background: rgba(0,0,0,0.75);
    color:white;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background: rgba(255,255,255,0.08);
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
}

.flash{
    color:#ffcc00;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Yeni Şifre Belirle</h2>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="flash">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST">
    <input type="password" name="password" placeholder="Yeni Şifre" required>
    <input type="password" name="password2" placeholder="Yeni Şifreyi Tekrar Gir" required>
    <button type="submit">Şifreyi Güncelle</button>
</form>

</div>

</body>
</html>
