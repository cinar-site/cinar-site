<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Şifremi Unuttum</title>

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image: url("{{ url_for('static', filename='bg.png') }}");
    background-size:cover;
    font-family:'Segoe UI';
}

.box{
    width:400px;
    padding:40px;
    border-radius:25px;
    backdrop-filter: blur(25px);
    background: rgba(0,0,0,0.75);
    color:white;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background: rgba(255,255,255,0.08);
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background: linear-gradient(90deg,#ff4b2b,#ff0844);
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Şifre Sıfırlama</h2>
<p>Email adresinizi girin</p>

<form method="POST">
    <input type="email" name="email" placeholder="E-posta" required>
    <button type="submit">Kod Gönder</button>
</form>

</div>

</body>
</html>
